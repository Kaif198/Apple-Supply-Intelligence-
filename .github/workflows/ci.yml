name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  python-quality:
    name: python · ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
      - name: Sync workspace
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy packages apps

  python-test:
    name: python · pytest (${{ matrix.python-version }}, ${{ matrix.marker }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        marker: ["unit", "integration", "property"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
      - name: Sync workspace
        run: uv sync --all-extras
      - name: Bootstrap data
        run: uv run python -m asciip_data_pipeline.bootstrap --seed-from-snapshots
      - name: Pytest
        env:
          ASCIIP_ENABLE_SCHEDULER: "false"
          ASCIIP_LOG_PRETTY: "false"
        run: |
          uv run pytest -m "${{ matrix.marker }} and not e2e" \
            --cov=packages --cov=apps \
            --cov-report=xml:coverage-${{ matrix.python-version }}-${{ matrix.marker }}.xml \
            --junitxml=junit-${{ matrix.python-version }}-${{ matrix.marker }}.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.marker }}
          path: coverage-*.xml
          if-no-files-found: ignore
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}-${{ matrix.marker }}
          path: junit-*.xml
          if-no-files-found: ignore

  web-quality:
    name: web · eslint + tsc + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace
        working-directory: .
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit tests
        run: pnpm run test -- --reporter=default --reporter=junit --outputFile=junit.xml || true
      - name: Build
        run: pnpm run build
      - name: Upload Next build artefact
        uses: actions/upload-artifact@v4
        with:
          name: web-next-build
          path: apps/web/.next
          retention-days: 3

  traceability:
    name: requirements · coverage matrix
    runs-on: ubuntu-latest
    needs: [python-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
      - run: uv sync --all-extras
      - name: Verify every requirement has at least one req_N test marker
        run: uv run pytest tests/meta/test_requirement_coverage.py -v
