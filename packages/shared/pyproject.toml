[project]
name = "asciip-shared"
version = "0.1.0"
description = "ASCIIP — shared config, logging, exceptions, provenance"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Proprietary" }
dependencies = [
  "pydantic>=2.8.0",
  "pydantic-settings>=2.5.0",
  "python-dotenv>=1.0.1",
  "rich>=13.8.0",
  "structlog>=24.4.0",
  "orjson>=3.10.7",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asciip_shared"]
