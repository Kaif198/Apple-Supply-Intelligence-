[project]
name = "asciip-data-pipeline"
version = "0.1.0"
description = "ASCIIP — Layer 2/3: ingestion, feature store, supplier extraction"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Proprietary" }
dependencies = [
  "asciip-shared",
  "polars>=1.8.0",
  "duckdb>=1.1.0",
  "pyarrow>=17.0.0",
  "httpx>=0.27.0",
  "tenacity>=9.0.0",
  "pypdf>=5.0.0",
  "selectolax>=0.3.21",
  "apscheduler>=3.10.4",
  "yfinance>=0.2.43",
  "fredapi>=0.5.2",
  "finnhub-python>=2.4.20",
  "numpy>=2.1.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asciip_data_pipeline"]
