# Render.com blueprint for the ASCIIP API.
# The web frontend deploys separately via Vercel (see vercel.json).
#
# Free tier constraints (enforced by Render blueprint validation):
#   * persistent disks are not allowed
#   * cron services are not allowed
# The API uses ephemeral writable paths under /tmp/asciip; the DuckDB feature
# store is rebuilt from the parquet snapshots baked into the image on every
# cold start. Scheduled ingestion runs via the GitHub Actions workflow
# `.github/workflows/ingest.yml`, not a Render cron.

services:
  - type: web
    name: asciip-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ASCIIP_ENV
        value: production
      - key: ASCIIP_LOG_PRETTY
        value: "false"
      - key: ASCIIP_DATA_DIR
        value: /tmp/asciip
      - key: ASCIIP_DUCKDB_PATH
        value: /tmp/asciip/features/asciip.duckdb
      - key: ASCIIP_SNAPSHOTS_DIR
        value: /tmp/asciip/snapshots
      - key: ASCIIP_RAW_DIR
        value: /tmp/asciip/raw
      - key: ASCIIP_MODELS_DIR
        value: /tmp/asciip/models
      - key: ASCIIP_EXPORTS_DIR
        value: /tmp/asciip/exports
      - key: ASCIIP_CORS_ORIGINS
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: MARKETAUX_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: COMTRADE_API_KEY
        sync: false
      - key: ASCIIP_ALERT_WEBHOOK_URL
        sync: false
